<!doctype html>
<html lang="hi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="फैशन टेलर्स कनवास - प्रीमियम टेलरिंग, कनवास, राजस्थान" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tailors" />
    <link rel="apple-touch-icon" href="/assets/generated/kanwas-icon-192.dim_192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/generated/kanwas-icon-512.dim_512x512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>फैशन टेलर्स कनवास</title>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('SW registered:', reg.scope);
            })
            .catch(function(err) {
              console.log('SW registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
